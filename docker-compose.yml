services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: promptlab
      POSTGRES_PASSWORD: promptlab
      POSTGRES_DB: promptlab
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U promptlab"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://promptlab:promptlab@db:5432/promptlab
      NEXTAUTH_URL: http://localhost:3000
      # Set these in a .env file or override here:
      # NEXTAUTH_SECRET: your-secret-here
      # OPENAI_API_KEY: sk-...
      # ANTHROPIC_API_KEY: sk-ant-...
      # GITHUB_CLIENT_ID: ...
      # GITHUB_CLIENT_SECRET: ...
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node server.js"

volumes:
  pgdata:
